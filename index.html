<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>SetTracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --accent: #6c8fff;
      --accent-dim: #2a3560;
      --text: #f0f0f0;
      --text-muted: #888;
      --danger: #ff5f5f;
      --success: #4caf7d;
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 16px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #app {
      width: 100%;
      max-width: 480px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--accent);
    }

    .header-btn {
      background: var(--surface2);
      border: none;
      color: var(--text);
      font-size: 14px;
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-weight: 500;
    }

    .header-btn:active { opacity: 0.7; }

    /* Content */
    .content {
      flex: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .view { display: none; flex-direction: column; flex: 1; }
    .view.active { display: flex; }

    /* Date label */
    .session-date {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      text-align: center;
      padding: 40px 0;
    }

    .empty-state .icon {
      font-size: 48px;
      opacity: 0.4;
    }

    .empty-state p {
      font-size: 15px;
    }

    /* Exercise card */
    .exercise-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .exercise-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .exercise-name {
      font-size: 16px;
      font-weight: 600;
    }

    .exercise-delete-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      border-radius: 4px;
    }

    .exercise-delete-btn:active { color: var(--danger); }

    /* Sets table */
    .sets-list {
      display: flex;
      flex-direction: column;
    }

    .set-row {
      display: grid;
      grid-template-columns: 48px 1fr 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }

    .set-row:last-child { border-bottom: none; }

    .set-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .set-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 15px;
      font-weight: 500;
      padding: 8px 10px;
      width: 100%;
      text-align: center;
      -moz-appearance: textfield;
    }

    .set-input::-webkit-inner-spin-button,
    .set-input::-webkit-outer-spin-button { -webkit-appearance: none; }

    .set-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .set-input-label {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 2px;
    }

    .set-input-group {
      display: flex;
      flex-direction: column;
    }

    .set-delete-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      line-height: 1;
    }

    .set-delete-btn:active { color: var(--danger); }

    /* Add set button */
    .add-set-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 12px;
      background: none;
      border: none;
      border-top: 1px solid var(--border);
      color: var(--accent);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .add-set-btn:active { background: var(--accent-dim); }

    /* Buttons */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 20px;
      border-radius: var(--radius);
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      min-height: 52px;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:active { opacity: 0.85; }

    .btn-outline {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-outline:active { background: var(--surface2); }

    .btn-danger {
      background: var(--danger);
      color: #fff;
    }

    /* Add exercise input area */
    .add-exercise-area {
      display: flex;
      gap: 10px;
    }

    .text-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 16px;
      padding: 12px 16px;
      min-height: 52px;
    }

    .text-input::placeholder { color: var(--text-muted); }

    .text-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .add-confirm-btn {
      background: var(--accent);
      border: none;
      color: #fff;
      font-size: 22px;
      border-radius: var(--radius);
      padding: 0 18px;
      cursor: pointer;
      min-height: 52px;
    }

    .add-confirm-btn:active { opacity: 0.8; }

    /* Finish area */
    .finish-area {
      margin-top: auto;
      padding-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* History */
    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .history-item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
    }

    .history-item-header:active { background: var(--surface2); }

    .history-date {
      font-size: 15px;
      font-weight: 600;
    }

    .history-summary {
      font-size: 13px;
      color: var(--text-muted);
    }

    .history-chevron {
      color: var(--text-muted);
      font-size: 14px;
      transition: transform 0.2s;
    }

    .history-item.open .history-chevron { transform: rotate(180deg); }

    .history-detail {
      display: none;
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      flex-direction: column;
      gap: 12px;
    }

    .history-item.open .history-detail { display: flex; }

    .history-exercise-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .history-set-row {
      display: grid;
      grid-template-columns: 52px 1fr 1fr;
      gap: 8px;
      font-size: 13px;
      padding: 4px 0;
    }

    .history-set-label { color: var(--text-muted); font-weight: 500; }

    .history-set-val {
      color: var(--text);
      font-weight: 500;
    }

    .history-delete-btn {
      margin-top: 8px;
      background: none;
      border: 1px solid var(--border);
      color: var(--danger);
      font-size: 13px;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      align-self: flex-start;
    }

    .history-delete-btn:active { background: #2a1010; }

    /* Section divider */
    .section-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Modal / confirm overlay */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }

    .overlay.active { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 24px 20px;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .modal h2 {
      font-size: 18px;
      font-weight: 700;
    }

    .modal p {
      font-size: 15px;
      color: var(--text-muted);
    }

    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--success);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 999px;
      z-index: 200;
      transition: transform 0.3s ease;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div id="app">

  <!-- ===== WORKOUT VIEW ===== -->
  <div id="workout-view" class="view active">
    <div class="header">
      <h1>SetTracker</h1>
      <button class="header-btn" onclick="showHistory()">History →</button>
    </div>
    <div class="content" id="workout-content">
      <!-- rendered by JS -->
    </div>
  </div>

  <!-- ===== HISTORY VIEW ===== -->
  <div id="history-view" class="view">
    <div class="header">
      <button class="header-btn" onclick="showWorkout()">← Back</button>
      <h1>History</h1>
      <div style="width:80px"></div>
    </div>
    <div class="content" id="history-content">
      <!-- rendered by JS -->
    </div>
  </div>

</div>

<!-- Finish Workout Confirm Modal -->
<div class="overlay" id="finish-overlay">
  <div class="modal">
    <h2>Finish Workout?</h2>
    <p>This session will be saved to your history.</p>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="confirmFinish()">Save Workout</button>
      <button class="btn btn-outline" onclick="closeModal()">Keep Going</button>
    </div>
  </div>
</div>

<!-- Delete Session Confirm Modal -->
<div class="overlay" id="delete-overlay">
  <div class="modal">
    <h2>Delete Session?</h2>
    <p>This workout will be permanently removed from your history.</p>
    <div class="modal-actions">
      <button class="btn btn-danger" onclick="confirmDeleteSession()">Delete</button>
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── Storage Layer ────────────────────────────────────────────────────────────

let _memStore = null;

function loadData() {
  try {
    const val = localStorage.getItem('settracker');
    if (val) return JSON.parse(val);
  } catch {}
  return _memStore ? JSON.parse(JSON.stringify(_memStore)) : {};
}

function saveData(data) {
  _memStore = JSON.parse(JSON.stringify(data));
  try {
    localStorage.setItem('settracker', JSON.stringify(data));
  } catch {}
}

function getData() {
  const d = loadData();
  if (!d.sessions) d.sessions = [];
  if (!d.currentSession) d.currentSession = null;
  return d;
}

function startNewSession() {
  const d = getData();
  if (!d.currentSession) {
    d.currentSession = {
      id: Date.now().toString(),
      date: todayISO(),
      exercises: []
    };
    saveData(d);
  }
  return d.currentSession;
}

function finishSession() {
  const d = getData();
  if (!d.currentSession) return;
  // Only save if there's at least one exercise with a set
  const hasContent = d.currentSession.exercises.some(e => e.sets.length > 0);
  if (!hasContent) {
    d.currentSession = null;
    saveData(d);
    return;
  }
  d.sessions.unshift(d.currentSession);
  d.currentSession = null;
  saveData(d);
}

function discardSession() {
  const d = getData();
  d.currentSession = null;
  saveData(d);
}

// ─── Helpers ──────────────────────────────────────────────────────────────────

function todayISO() {
  return new Date().toISOString().slice(0, 10);
}

function formatDate(isoDate) {
  const [y, m, day] = isoDate.split('-').map(Number);
  return new Date(y, m - 1, day).toLocaleDateString('en-US', {
    month: 'short', day: 'numeric', year: 'numeric'
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── Navigation ───────────────────────────────────────────────────────────────

function showHistory() {
  document.getElementById('workout-view').classList.remove('active');
  document.getElementById('history-view').classList.add('active');
  renderHistory();
}

function showWorkout() {
  document.getElementById('history-view').classList.remove('active');
  document.getElementById('workout-view').classList.add('active');
  renderWorkout();
}

// ─── Modal ────────────────────────────────────────────────────────────────────

let pendingDeleteId = null;

function openFinishModal() {
  document.getElementById('finish-overlay').classList.add('active');
}

function openDeleteModal(sessionId) {
  pendingDeleteId = sessionId;
  document.getElementById('delete-overlay').classList.add('active');
}

function closeModal() {
  document.getElementById('finish-overlay').classList.remove('active');
  document.getElementById('delete-overlay').classList.remove('active');
  pendingDeleteId = null;
}

function confirmFinish() {
  closeModal();
  finishSession();
  renderWorkout();
  showToast('Workout saved!');
}

function confirmDeleteSession() {
  if (!pendingDeleteId) return;
  const d = getData();
  d.sessions = d.sessions.filter(s => s.id !== pendingDeleteId);
  saveData(d);
  closeModal();
  renderHistory();
  showToast('Session deleted');
}

// Close modals on overlay click
document.getElementById('finish-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.getElementById('delete-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ─── Workout View ─────────────────────────────────────────────────────────────

function renderWorkout() {
  const d = getData();
  const session = d.currentSession;
  const container = document.getElementById('workout-content');
  container.innerHTML = '';

  // Date line
  const dateLine = document.createElement('div');
  dateLine.className = 'session-date';
  dateLine.textContent = session
    ? 'Today — ' + new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
    : 'No active session';
  container.appendChild(dateLine);

  if (!session || session.exercises.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = `<div class="icon">🏋️</div><p>Add your first exercise<br>to start tracking.</p>`;
    container.appendChild(empty);
  } else {
    session.exercises.forEach((ex, exIdx) => {
      container.appendChild(buildExerciseCard(ex, exIdx));
    });
  }

  // Add exercise input
  const addArea = document.createElement('div');
  addArea.className = 'add-exercise-area';

  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'text-input';
  input.placeholder = 'Exercise name…';
  input.id = 'new-exercise-input';
  input.setAttribute('autocomplete', 'off');
  input.addEventListener('keydown', e => { if (e.key === 'Enter') addExercise(); });

  const addBtn = document.createElement('button');
  addBtn.className = 'add-confirm-btn';
  addBtn.textContent = '+';
  addBtn.setAttribute('aria-label', 'Add exercise');
  addBtn.addEventListener('click', addExercise);

  addArea.appendChild(input);
  addArea.appendChild(addBtn);
  container.appendChild(addArea);

  // Finish / Discard
  if (session) {
    const finishArea = document.createElement('div');
    finishArea.className = 'finish-area';

    const finishBtn = document.createElement('button');
    finishBtn.className = 'btn btn-primary';
    finishBtn.textContent = 'Finish Workout';
    finishBtn.addEventListener('click', openFinishModal);

    const discardBtn = document.createElement('button');
    discardBtn.className = 'btn btn-outline';
    discardBtn.textContent = 'Discard Session';
    discardBtn.style.color = 'var(--danger)';
    discardBtn.addEventListener('click', () => {
      discardSession();
      renderWorkout();
    });

    finishArea.appendChild(finishBtn);
    finishArea.appendChild(discardBtn);
    container.appendChild(finishArea);
  }
}

function buildExerciseCard(ex, exIdx) {
  const card = document.createElement('div');
  card.className = 'exercise-card';

  // Header
  const header = document.createElement('div');
  header.className = 'exercise-header';

  const name = document.createElement('div');
  name.className = 'exercise-name';
  name.textContent = ex.name;

  const delBtn = document.createElement('button');
  delBtn.className = 'exercise-delete-btn';
  delBtn.textContent = '✕';
  delBtn.setAttribute('aria-label', 'Remove exercise');
  delBtn.addEventListener('click', () => deleteExercise(exIdx));

  header.appendChild(name);
  header.appendChild(delBtn);
  card.appendChild(header);

  // Sets
  const setsList = document.createElement('div');
  setsList.className = 'sets-list';

  ex.sets.forEach((set, setIdx) => {
    setsList.appendChild(buildSetRow(set, exIdx, setIdx));
  });

  card.appendChild(setsList);

  // Add set button
  const addSetBtn = document.createElement('button');
  addSetBtn.className = 'add-set-btn';
  addSetBtn.innerHTML = '+ Add Set';
  addSetBtn.addEventListener('click', () => addSet(exIdx));
  card.appendChild(addSetBtn);

  return card;
}

function buildSetRow(set, exIdx, setIdx) {
  const row = document.createElement('div');
  row.className = 'set-row';

  const label = document.createElement('div');
  label.className = 'set-label';
  label.textContent = `Set ${setIdx + 1}`;

  // Reps group
  const repsGroup = document.createElement('div');
  repsGroup.className = 'set-input-group';
  const repsInput = document.createElement('input');
  repsInput.type = 'number';
  repsInput.className = 'set-input';
  repsInput.value = set.reps ?? '';
  repsInput.placeholder = '0';
  repsInput.min = '0';
  repsInput.setAttribute('inputmode', 'numeric');
  repsInput.addEventListener('change', () => updateSet(exIdx, setIdx, 'reps', repsInput.value));
  const repsLabel = document.createElement('div');
  repsLabel.className = 'set-input-label';
  repsLabel.textContent = 'reps';
  repsGroup.appendChild(repsInput);
  repsGroup.appendChild(repsLabel);

  // Weight group
  const wtGroup = document.createElement('div');
  wtGroup.className = 'set-input-group';
  const wtInput = document.createElement('input');
  wtInput.type = 'number';
  wtInput.className = 'set-input';
  wtInput.value = set.weight ?? '';
  wtInput.placeholder = '0';
  wtInput.min = '0';
  wtInput.setAttribute('inputmode', 'decimal');
  wtInput.addEventListener('change', () => updateSet(exIdx, setIdx, 'weight', wtInput.value));
  const wtLabel = document.createElement('div');
  wtLabel.className = 'set-input-label';
  wtLabel.textContent = 'lbs';
  wtGroup.appendChild(wtInput);
  wtGroup.appendChild(wtLabel);

  // Delete set btn
  const delBtn = document.createElement('button');
  delBtn.className = 'set-delete-btn';
  delBtn.textContent = '✕';
  delBtn.setAttribute('aria-label', 'Remove set');
  delBtn.addEventListener('click', () => deleteSet(exIdx, setIdx));

  row.appendChild(label);
  row.appendChild(repsGroup);
  row.appendChild(wtGroup);
  row.appendChild(delBtn);
  return row;
}

// ─── Workout Actions ──────────────────────────────────────────────────────────

function addExercise() {
  const input = document.getElementById('new-exercise-input');
  const name = input.value.trim();
  if (!name) { input.focus(); return; }

  const d = getData();
  if (!d.currentSession) {
    d.currentSession = {
      id: Date.now().toString(),
      date: todayISO(),
      exercises: []
    };
  }
  d.currentSession.exercises.push({ name, sets: [] });
  saveData(d);
  input.value = '';
  renderWorkout();
  // Scroll to bottom so new card is visible
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function deleteExercise(exIdx) {
  const d = getData();
  d.currentSession.exercises.splice(exIdx, 1);
  saveData(d);
  renderWorkout();
}

function addSet(exIdx) {
  const d = getData();
  d.currentSession.exercises[exIdx].sets.push({ reps: '', weight: '' });
  saveData(d);
  renderWorkout();
}

function deleteSet(exIdx, setIdx) {
  const d = getData();
  d.currentSession.exercises[exIdx].sets.splice(setIdx, 1);
  saveData(d);
  renderWorkout();
}

function updateSet(exIdx, setIdx, field, value) {
  const d = getData();
  const parsed = parseFloat(value);
  d.currentSession.exercises[exIdx].sets[setIdx][field] = isNaN(parsed) ? '' : parsed;
  saveData(d);
}

// ─── History View ─────────────────────────────────────────────────────────────

function renderHistory() {
  const d = getData();
  const container = document.getElementById('history-content');
  container.innerHTML = '';

  if (d.sessions.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = `<div class="icon">📋</div><p>No workouts saved yet.<br>Finish a session to see it here.</p>`;
    container.appendChild(empty);
    return;
  }

  d.sessions.forEach(session => {
    container.appendChild(buildHistoryItem(session));
  });
}

function buildHistoryItem(session) {
  const item = document.createElement('div');
  item.className = 'history-item';

  const header = document.createElement('div');
  header.className = 'history-item-header';
  header.addEventListener('click', () => item.classList.toggle('open'));

  const left = document.createElement('div');
  left.style.display = 'flex';
  left.style.flexDirection = 'column';
  left.style.gap = '4px';

  const dateEl = document.createElement('div');
  dateEl.className = 'history-date';
  dateEl.textContent = formatDate(session.date);

  const summary = document.createElement('div');
  summary.className = 'history-summary';
  summary.textContent = session.exercises.map(e =>
    `${e.name} (${e.sets.length} set${e.sets.length !== 1 ? 's' : ''})`
  ).join(' · ');

  left.appendChild(dateEl);
  left.appendChild(summary);

  const chevron = document.createElement('span');
  chevron.className = 'history-chevron';
  chevron.textContent = '▾';

  header.appendChild(left);
  header.appendChild(chevron);
  item.appendChild(header);

  // Detail panel
  const detail = document.createElement('div');
  detail.className = 'history-detail';

  session.exercises.forEach(ex => {
    const exBlock = document.createElement('div');

    const exName = document.createElement('div');
    exName.className = 'history-exercise-name';
    exName.textContent = ex.name;
    exBlock.appendChild(exName);

    ex.sets.forEach((set, i) => {
      const row = document.createElement('div');
      row.className = 'history-set-row';

      const lbl = document.createElement('div');
      lbl.className = 'history-set-label';
      lbl.textContent = `Set ${i + 1}`;

      const repsVal = document.createElement('div');
      repsVal.className = 'history-set-val';
      repsVal.textContent = set.reps !== '' ? `${set.reps} reps` : '— reps';

      const wtVal = document.createElement('div');
      wtVal.className = 'history-set-val';
      wtVal.textContent = set.weight !== '' ? `${set.weight} lbs` : '— lbs';

      row.appendChild(lbl);
      row.appendChild(repsVal);
      row.appendChild(wtVal);
      exBlock.appendChild(row);
    });

    detail.appendChild(exBlock);
  });

  // Delete session button
  const delBtn = document.createElement('button');
  delBtn.className = 'history-delete-btn';
  delBtn.textContent = 'Delete Session';
  delBtn.addEventListener('click', () => openDeleteModal(session.id));
  detail.appendChild(delBtn);

  item.appendChild(detail);
  return item;
}

// ─── Init ─────────────────────────────────────────────────────────────────────

renderWorkout();
</script>
</body>
</html>
